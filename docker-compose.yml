version: '3'

services:

  frontend:
    build: ./frontend
    container_name: frontend

  api:
    build: ./api
    container_name: api

  admin:
    build: ./admin
    container_name: admin

  static1:
    build: ./static
    container_name: static1

  static2:
    build: ./static
    container_name: static2

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api
      - admin
      - static1
      - static2
